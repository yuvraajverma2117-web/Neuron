<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>J.A.R.V.I.S</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #00ffff;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    position: relative;
    user-select: none;
  }

  /* ── JARVIS CENTER GIF ── */
  #jarvis-container {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    transition: transform 0.05s ease;
  }
  #jarvis-gif {
    width: 340px;
    filter: hue-rotate(168deg) saturate(5) brightness(1.3);
    display: block;
  }

  /* ── CLOCK ── */
  #clock {
    position: absolute;
    top: 32px; left: 50%;
    transform: translateX(-50%);
    font-size: clamp(28px, 5vw, 64px);
    font-weight: 700;
    letter-spacing: 2px;
    z-index: 20;
    text-shadow: 0 0 18px #00ffff88;
  }

  /* ── SUN ICON (top-left) ── */
  #sun-icon {
    position: absolute;
    top: -20px; left: 10px;
    width: 160px;
    filter: hue-rotate(168deg) saturate(5) brightness(1.3);
    z-index: 5;
  }

  /* ── CALENDAR (top-right) ── */
  #calendar {
    position: absolute;
    top: 50px; right: 24px;
    font-size: 13px;
    line-height: 1.7;
    z-index: 20;
  }
  #calendar .cal-header {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
    text-align: center;
    letter-spacing: 1px;
  }
  #calendar table { border-collapse: collapse; }
  #calendar th {
    padding: 2px 6px;
    font-size: 11px;
    color: #00ffff99;
    font-weight: 400;
  }
  #calendar td {
    padding: 3px 6px;
    text-align: center;
    font-size: 12px;
    min-width: 26px;
  }
  #calendar td.today {
    background: #00ffff;
    color: #000;
    border-radius: 50%;
    font-weight: 700;
  }

  /* ── TO-DO (left side) ── */
  #todo {
    position: absolute;
    top: 260px; left: 30px;
    z-index: 20;
    max-width: 320px;
  }
  .todo-item {
    font-size: clamp(12px, 1.5vw, 18px);
    line-height: 1.9;
    text-shadow: 0 0 8px #00ffff55;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── RECORD ICON (bottom-left) ── */
  #record-icon {
    position: absolute;
    bottom: 60px; left: 24px;
    width: 80px;
    filter: hue-rotate(168deg) saturate(5) brightness(1.3);
    z-index: 20;
  }

  /* ── TRACK (bottom-left above record) ── */
  #track {
    position: absolute;
    bottom: 22px; left: 24px;
    font-size: clamp(10px, 1.4vw, 18px);
    z-index: 20;
    max-width: 400px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 0 10px #00ffff66;
  }

  /* ── PICO GIF (bottom-right area) ── */
  #pico-container {
    position: absolute;
    bottom: -60px;
    right: -200px;
    width: 420px;
    z-index: 8;
    cursor: grab;
  }
  #pico-container.grabbing { cursor: grabbing; }
  #pico-gif {
    width: 100%;
    filter: hue-rotate(168deg) saturate(5) brightness(1.3);
  }
  #pico-desc {
    position: absolute;
    top: 100%;
    left: 50px;
    font-size: 10px;
    line-height: 1.9;
    white-space: nowrap;
    text-shadow: 0 0 6px #00ffff44;
    margin-top: -20px;
  }

  /* ── ARK IMAGE (right side) ── */
  #ark-image {
    position: absolute;
    right: -30px;
    top: 50%;
    transform: translateY(-50%);
    width: 280px;
    opacity: 0.85;
    z-index: 5;
  }

  /* ── DISCORD ICON ── */
  #discord-icon {
    position: absolute;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    opacity: 0.7;
    z-index: 20;
    filter: drop-shadow(0 0 6px #5865F2);
  }

  /* ── AUDIO VISUALIZER RING (around JARVIS) ── */
  #audio-canvas {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9;
    pointer-events: none;
  }

  /* ── HAND TRACKING CANVAS ── */
  #hand-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 30;
    pointer-events: none;
  }

  /* ── SCAN LINES overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,255,0.015) 2px,
      rgba(0,255,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* ── AUDIO PERMISSION BUTTON ── */
  #mic-btn {
    position: absolute;
    bottom: 12px; right: 12px;
    background: transparent;
    border: 1px solid #00ffff55;
    color: #00ffff;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    padding: 6px 10px;
    cursor: pointer;
    z-index: 50;
    letter-spacing: 1px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  #mic-btn:hover { opacity: 1; }

  /* ── HAND TRACKING TOGGLE ── */
  #hand-btn {
    position: absolute;
    bottom: 12px; right: 120px;
    background: transparent;
    border: 1px solid #00ffff55;
    color: #00ffff;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    padding: 6px 10px;
    cursor: pointer;
    z-index: 50;
    letter-spacing: 1px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  #hand-btn:hover { opacity: 1; }
</style>
</head>
<body>

<!-- Clock -->
<div id="clock">00:00:00 AM</div>

<!-- Sun icon -->
<img id="sun-icon" src="/static/sun.png" alt="sun"/>

<!-- Calendar -->
<div id="calendar">
  <div class="cal-header" id="cal-month"></div>
  <table id="cal-table"></table>
</div>

<!-- To-Do -->
<div id="todo"></div>

<!-- Record icon -->
<img id="record-icon" src="/static/record.png" alt="record"/>

<!-- Track display -->
<div id="track"></div>

<!-- ARk image -->
<img id="ark-image" src="/static/ARk.jpeg" alt="ARk"/>

<!-- Discord icon -->
<img id="discord-icon" src="/static/discord.png" alt="discord"/>

<!-- Audio visualizer behind JARVIS -->
<canvas id="audio-canvas" width="420" height="420"></canvas>

<!-- JARVIS center GIF -->
<div id="jarvis-container">
  <img id="jarvis-gif" src="/static/jarvis.gif" alt="JARVIS"/>
</div>

<!-- PICO GIF -->
<div id="pico-container">
  <img id="pico-gif" src="/static/picogram.gif" alt="Pico"/>
  <div id="pico-desc"></div>
</div>

<!-- Hand tracking canvas overlay -->
<canvas id="hand-canvas"></canvas>

<!-- Controls -->
<button id="mic-btn" onclick="startAudio()">🎙 ENABLE MIC</button>
<button id="hand-btn" onclick="toggleHands()">✋ HANDS OFF</button>

<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ═══════════════════════════════════════════
//  DATA REFRESH
// ═══════════════════════════════════════════
async function refreshData() {
  try {
    const res = await fetch('/api/data');
    const d = await res.json();

    // Clock
    document.getElementById('clock').textContent = d.time;

    // Sun icon
    const sunImg = document.getElementById('sun-icon');
    const phaseMap = { sunrise: '/static/sunrise.png', sun: '/static/sun.png', sunset: '/static/sunset.png' };
    sunImg.src = phaseMap[d.sun_phase] || '/static/sun.png';

    // Calendar
    document.getElementById('cal-month').textContent = d.calendar.month;
    const tbl = document.getElementById('cal-table');
    tbl.innerHTML = '';
    const hdr = document.createElement('tr');
    d.calendar.weekdays.forEach(day => {
      const th = document.createElement('th');
      th.textContent = day;
      hdr.appendChild(th);
    });
    tbl.appendChild(hdr);
    d.calendar.weeks.forEach(week => {
      const tr = document.createElement('tr');
      week.forEach(day => {
        const td = document.createElement('td');
        if (day === 0) { td.textContent = ''; }
        else {
          td.textContent = day;
          if (day === d.calendar.today) td.className = 'today';
        }
        tr.appendChild(td);
      });
      tbl.appendChild(tr);
    });

    // To-Do
    const todoEl = document.getElementById('todo');
    todoEl.innerHTML = d.todo.slice(0, 8).map(t =>
      `<div class="todo-item">▸ ${t}</div>`
    ).join('');

    // Pico description
    document.getElementById('pico-desc').innerHTML = d.pico_description.map(l =>
      `<div>${l}</div>`
    ).join('');

  } catch(e) { console.error('Data fetch error:', e); }
}

// Refresh every second
refreshData();
setInterval(refreshData, 1000);


// ═══════════════════════════════════════════
//  AUDIO VISUALIZER
// ═══════════════════════════════════════════
let audioCtx, analyser, micStream;
let audioActive = false;
let smoothedVolume = 0;

async function startAudio() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    audioActive = true;
    document.getElementById('mic-btn').textContent = '🎙 MIC ON';
    document.getElementById('mic-btn').style.borderColor = '#00ffff';
  } catch(e) {
    console.warn('Mic access denied:', e);
    document.getElementById('mic-btn').textContent = '🎙 MIC DENIED';
  }
}

const audioCanvas = document.getElementById('audio-canvas');
const actx = audioCanvas.getContext('2d');
const RINGS = 64;
const RADIUS = 160;

function getVolume() {
  if (!analyser) return 0;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);
  const sum = buf.reduce((a, b) => a + b, 0);
  return sum / buf.length / 128;
}

function drawAudioRing(volume) {
  const W = audioCanvas.width, H = audioCanvas.height;
  const cx = W / 2, cy = H / 2;
  actx.clearRect(0, 0, W, H);

  smoothedVolume = smoothedVolume * 0.85 + volume * 0.15;
  const scale = 1 + Math.min(smoothedVolume * 0.6, 0.4);

  // Update JARVIS gif scale based on volume
  document.getElementById('jarvis-gif').style.transform = `scale(${scale})`;

  // Draw reactive ring
  actx.beginPath();
  for (let i = 0; i <= RINGS; i++) {
    const angle = (i / RINGS) * Math.PI * 2 - Math.PI / 2;
    const noise = (Math.random() - 0.5) * smoothedVolume * 40;
    const r = RADIUS * scale + noise;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    i === 0 ? actx.moveTo(x, y) : actx.lineTo(x, y);
  }
  actx.closePath();
  actx.strokeStyle = `rgba(0,255,255,${0.15 + smoothedVolume * 0.5})`;
  actx.lineWidth = 2;
  actx.shadowColor = '#00ffff';
  actx.shadowBlur = 10 + smoothedVolume * 20;
  actx.stroke();
  actx.shadowBlur = 0;
}


// ═══════════════════════════════════════════
//  PICO DRAG (mouse + touch)
// ═══════════════════════════════════════════
const picoEl = document.getElementById('pico-container');
let dragging = false, dragOffX = 0, dragOffY = 0;

picoEl.addEventListener('mousedown', e => {
  dragging = true;
  const r = picoEl.getBoundingClientRect();
  dragOffX = e.clientX - r.left;
  dragOffY = e.clientY - r.top;
  picoEl.classList.add('grabbing');
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  picoEl.style.left = (e.clientX - dragOffX) + 'px';
  picoEl.style.top = (e.clientY - dragOffY) + 'px';
  picoEl.style.right = 'auto'; picoEl.style.bottom = 'auto';
});
document.addEventListener('mouseup', () => {
  dragging = false;
  picoEl.classList.remove('grabbing');
});

// Touch drag
picoEl.addEventListener('touchstart', e => {
  dragging = true;
  const r = picoEl.getBoundingClientRect();
  dragOffX = e.touches[0].clientX - r.left;
  dragOffY = e.touches[0].clientY - r.top;
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (!dragging) return;
  picoEl.style.left = (e.touches[0].clientX - dragOffX) + 'px';
  picoEl.style.top = (e.touches[0].clientY - dragOffY) + 'px';
  picoEl.style.right = 'auto'; picoEl.style.bottom = 'auto';
}, { passive: true });
document.addEventListener('touchend', () => dragging = false);


// ═══════════════════════════════════════════
//  MEDIAPIPE HAND TRACKING
// ═══════════════════════════════════════════
const handCanvas = document.getElementById('hand-canvas');
const hctx = handCanvas.getContext('2d');
let handTrackingEnabled = true;
let handsInstance = null;
let cameraInstance = null;
let hiddenVideo = null;

const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

let lastHandLandmarks = null;

function toggleHands() {
  handTrackingEnabled = !handTrackingEnabled;
  document.getElementById('hand-btn').textContent =
    handTrackingEnabled ? '✋ HANDS OFF' : '✋ HANDS ON';
  if (!handTrackingEnabled) {
    hctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
    lastHandLandmarks = null;
  }
}

function initHandTracking() {
  try {
    handsInstance = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    handsInstance.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });
    handsInstance.onResults(onHandResults);

    hiddenVideo = document.createElement('video');
    hiddenVideo.style.display = 'none';
    document.body.appendChild(hiddenVideo);

    const cam = new Camera(hiddenVideo, {
      onFrame: async () => {
        if (handTrackingEnabled && handsInstance) {
          await handsInstance.send({ image: hiddenVideo });
        }
      },
      width: 640, height: 480
    });
    cam.start().catch(e => console.warn('Camera for hands failed:', e));
    cameraInstance = cam;
  } catch(e) {
    console.warn('MediaPipe init failed:', e);
  }
}

function onHandResults(results) {
  handCanvas.width = window.innerWidth;
  handCanvas.height = window.innerHeight;
  hctx.clearRect(0, 0, handCanvas.width, handCanvas.height);
  if (!handTrackingEnabled) return;

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const hand = results.multiHandLandmarks[0];
    lastHandLandmarks = hand;
    drawHand(hand);

    // Pico grab with closed hand (fingertips below lower joints)
    const tips = [8, 12, 16, 20];
    const closed = tips.every(tip => hand[tip].y > hand[tip - 2].y);
    const mcp = hand[9];
    const mcpX = mcp.x * window.innerWidth;
    const mcpY = mcp.y * window.innerHeight;

    if (closed) {
      const pr = picoEl.getBoundingClientRect();
      if (mcpX >= pr.left && mcpX <= pr.right && mcpY >= pr.top && mcpY <= pr.bottom) {
        picoEl.style.left = (mcpX - pr.width / 2) + 'px';
        picoEl.style.top = (mcpY - pr.height / 2) + 'px';
        picoEl.style.right = 'auto'; picoEl.style.bottom = 'auto';
      }
    }
  } else {
    lastHandLandmarks = null;
  }
}

function drawHand(landmarks) {
  const W = handCanvas.width, H = handCanvas.height;

  // Draw connections
  hctx.strokeStyle = 'rgba(0,255,255,0.8)';
  hctx.lineWidth = 2;
  hctx.shadowColor = '#00ffff';
  hctx.shadowBlur = 6;
  HAND_CONNECTIONS.forEach(([a, b]) => {
    hctx.beginPath();
    hctx.moveTo(landmarks[a].x * W, landmarks[a].y * H);
    hctx.lineTo(landmarks[b].x * W, landmarks[b].y * H);
    hctx.stroke();
  });

  // Draw dots
  landmarks.forEach(lm => {
    hctx.beginPath();
    hctx.arc(lm.x * W, lm.y * H, 5, 0, Math.PI * 2);
    hctx.fillStyle = '#00ffff';
    hctx.fill();
  });
  hctx.shadowBlur = 0;
}


// ═══════════════════════════════════════════
//  MAIN ANIMATION LOOP
// ═══════════════════════════════════════════
function loop() {
  requestAnimationFrame(loop);
  // Resize hand canvas
  if (handCanvas.width !== window.innerWidth) {
    handCanvas.width = window.innerWidth;
    handCanvas.height = window.innerHeight;
  }
  const vol = audioActive ? getVolume() : 0;
  drawAudioRing(vol);
}

// Init
window.addEventListener('load', () => {
  initHandTracking();
  loop();
});
</script>
</body>
</html>
